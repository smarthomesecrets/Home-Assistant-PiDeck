# stream_deck_office_sonos_volume_up.yaml
# Increases office Sonos volume by one step.
#
# YOUR_SONOS_ENTITY: Office Sonos media player entity ID
#   Example: media_player.office_sonos

stream_deck_office_sonos_volume_up:
  alias: Stream Deck Office Sonos Volume Up
  description: Increases office Sonos volume.
  mode: single
  sequence:
    - service: media_player.volume_up
      target:
        # YOUR_SONOS_ENTITY: Office Sonos media player entity ID
        entity_id: YOUR_SONOS_ENTITY
